<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Axiom | By Dunko</title>

    <meta name="description" content="Axiom is a high-performance, ultra-smooth web dashboard featuring glassmorphism design. Explore the void with custom shortcuts and seamless navigation, created by Dunko.">
    <meta name="keywords" content="Axiom, Dunko, Axiom Web, Glassmorphism, Smooth UI, Web Dashboard">
    <meta name="author" content="Dunko">
    
    <meta name="google-site-verification" content="YOUR_CODE_HERE" />

    <meta property="og:title" content="Axiom | By Dunko">
    <meta property="og:description" content="The ultimate smooth web experience. Designed by Dunko.">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #000;">

    <div id="custom-cursor"></div>
    <canvas id="star-canvas"></canvas>

    <div id="loader-wrapper">
        <div class="spinner"></div>
    </div>

    <header id="main-header" class="glass-header hidden-element">
        <div class="header-left">
            <div class="advanced-logo">
                <div class="logo-inner"></div>
                <span>AXIOM</span>
            </div>
        </div>
        <div class="header-right">
            <span id="live-temp">68°F · Los Angeles</span>
            <span id="live-clock">--:--:-- --</span>
        </div>
    </header>

    <main id="main-ui" class="hidden-element">
        <div class="hero-section">
            <h1 class="hero-logo">Axiom</h1>
            
            <div class="premium-search">
                <input type="text" id="main-url-input" placeholder="Search the void...">
                <button id="main-go-btn">Explore</button>
            </div>

            <div class="shortcut-row">
                <div class="glass-shortcut" id="shortcut-music">
                    <img src="https://i.ibb.co/Xz95mB4/music-symbol.png" alt="Music">
                    <div class="label">Music</div>
                </div>
                <div class="glass-shortcut" id="shortcut-movies">
                    <div class="empty-photo"></div>
                    <div class="label">Movies</div>
                </div>
                <div class="glass-shortcut placeholder"><span>+</span></div>
            </div>
        </div>

        <div class="bottom-dock">
            <button class="dock-btn">Settings</button>
            <div class="dock-divider"></div>
            <button class="dock-btn">Games</button>
            <div class="dock-divider"></div>
            <button class="dock-btn" id="about-trigger">About Us</button>
        </div>
    </main>

    <div id="frame-container" class="hidden-element" style="display: none; background: #000;">
        <nav class="advanced-browser-nav">
            <div class="nav-blur-bg"></div>
            <div class="nav-content">
                <div class="nav-group">
                    <button id="nav-home">Home</button>
                    <button id="nav-refresh">↻</button>
                </div>
                <div class="omni-wrap">
                    <div class="omni-icon">🔒</div>
                    <input type="text" id="omni-bar" placeholder="Navigate the web...">
                </div>
            </div>
        </nav>
        <div class="iframe-wrapper" style="background: #000;">
            <iframe id="content-frame" src="about:blank" style="background: #000;"></iframe>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
