<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom / Freedom At Last</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="custom-cursor"></div>
    <canvas id="particle-canvas"></canvas>

    <div id="loader-wrapper">
        <div class="spinner"></div>
    </div>

    <header id="main-header" class="glass-header hidden">
        <div class="header-left">
            <div class="header-logo-badge">A</div>
            <span class="header-logo-text">AXIOM</span>
        </div>
        <div class="header-right">
            <span id="live-temp">68°F · Los Angeles</span>
            <span id="live-clock">--:--:-- --</span>
        </div>
    </header>

    <main id="main-ui" class="hidden">
        <div class="hero-section">
            <h1 class="hero-logo">Axiom</h1>
            
            <div class="floating-search">
                <input type="text" id="main-url-input" placeholder="Search the void...">
                <button id="main-go-btn">Enter</button>
            </div>

            <div class="shortcut-row">
                <div class="glass-shortcut" id="shortcut-music">
                    <img src="https://i.ibb.co/Xz95mB4/music-symbol.png" alt="Music">
                    <div class="label">Music</div>
                </div>
                <div class="glass-shortcut" id="shortcut-movies">
                    <div class="empty-photo"></div>
                    <div class="label">Movies</div>
                </div>
                <div class="glass-shortcut placeholder"><span>+</span></div>
            </div>
        </div>

        <div class="bottom-dock">
            <button class="dock-btn" onclick="alert('Settings coming soon...')">Settings</button>
            <button class="dock-btn" onclick="alert('Games coming soon...')">Games</button>
            <button class="dock-btn" onclick="showAbout()">About Us</button>
        </div>
    </main>

    <div id="frame-container" class="hidden">
        <nav class="browser-nav">
            <div class="nav-group">
                <button id="nav-home">Home</button>
                <button id="nav-refresh">↻</button>
            </div>
            <div class="omni-wrap">
                <input type="text" id="omni-bar" placeholder="Navigate...">
            </div>
        </nav>
        <div class="iframe-wrapper">
            <iframe id="content-frame" src=""></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
