<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom / Freedom at Last</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="custom-cursor"></div>
    <canvas id="particle-canvas"></canvas>

    <div id="loader-wrapper">
        <div class="spinner"></div>
    </div>

    <header id="main-header" class="glass-header hidden">
        <div class="header-left">
            <div class="header-logo-badge">A</div>
            <span class="header-logo-text">AXIOM</span>
        </div>
        <div class="header-right">
            <span id="live-temp">68°F · Los Angeles</span>
            <span id="live-clock">--:--:-- --</span>
        </div>
    </header>

    <main id="main-ui" class="hidden">
        <div class="dashboard-container">
            <h1 class="hero-logo">Axiom</h1>
            
            <div class="glass-search">
                <input type="text" id="main-url-input" placeholder="Search the web or enter a URL...">
                <button id="main-go-btn">Go</button>
            </div>

            <div class="shortcut-grid">
                <div class="shortcut-box" id="shortcut-music">
                    <img src="https://i.ibb.co/Xz95mB4/music-symbol.png" alt="Music">
                    <div class="shortcut-label">Music</div>
                </div>
                <div class="shortcut-box" id="shortcut-movies">
                    <div class="empty-photo"></div>
                    <div class="shortcut-label">Movies</div>
                </div>
                <div class="shortcut-box placeholder"><span>+</span></div>
                <div class="shortcut-box placeholder"><span>+</span></div>
            </div>
        </div>
    </main>

    <div id="frame-container" class="hidden">
        <nav class="browser-nav glass-nav">
            <div class="nav-btns">
                <button id="nav-home">Home</button>
                <button id="nav-refresh">↻</button>
            </div>
            <div class="address-bar-wrap">
                <input type="text" id="omni-bar" placeholder="Enter URL...">
            </div>
        </nav>
        <iframe id="content-frame" src=""></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
