<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="custom-cursor"></div>
    <canvas id="particle-canvas"></canvas>

    <div id="loader-wrapper">
        <div class="spinner"></div>
    </div>

    <main id="main-ui" class="hidden">
        <div class="glass-card">
            <h1 class="logo">Axiom</h1>
            
            <div class="search-container">
                <input type="text" id="main-url-input" placeholder="Explore the web...">
                <button id="main-go-btn">Go</button>
            </div>

            <div class="shortcuts">
                <div class="shortcut-square" id="shortcut-music">
                    <img src="https://i.ibb.co/Xz95mB4/music-symbol.png" alt="Music">
                    <div class="label">Music</div>
                </div>
                <div class="shortcut-square placeholder"><span>+</span></div>
                <div class="shortcut-square placeholder"><span>+</span></div>
            </div>
        </div>
    </main>

    <div id="frame-container" class="hidden">
        <nav class="frame-nav glass-nav">
            <div class="nav-controls">
                <button id="nav-home">Home</button>
                <button id="nav-refresh">↻</button>
            </div>
            <div class="omnibar-wrap">
                <input type="text" id="omni-bar" placeholder="Enter URL...">
            </div>
        </nav>
        <iframe id="content-frame" src=""></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
